title: "Kam Remake - calculator - "
---

{% include header.html %}
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css" />
	<script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/hyperformula/dist/hyperformula.full.min.js"></script>
	<style>
		html, body { height:100%; margin:0; }
		#sheet { height:100%; }
	</style>
</head>
<body>
	<div id="sheet"></div>

	<script>
		const hf = HyperFormula.buildEmpty({
			licenseKey: 'gpl-v3'
		});

		const hot = new Handsontable(document.getElementById('sheet'), {
			data: [
				[,'amount', 'Swine Farms','Mills', 'corn',''],
				['Butcher',, '=B2*3',, '=ROUNDUP(B2*4.8, 0)'],
				['Baker',,, '=B3*1', '=B3*1'],
				['Stables',,,, '=B4*2'],
				['total corn','','','','', '=SUM(E2:E4)'],
				[],
				[,'amount','Wood Cutter'],
				['Sawmill',,'=B8*2', ],
				[],
				[,'amount','Swine Farms'],
				['Tanery',,'=B11*3', ],
				[],
				[,'building 1','building 2','building 3',,'total recruitments'],
				['statics building',,,,,'=SUM(B14:D14)' ],
			],
			rowHeaders: true,
			colHeaders: true,
			contextMenu: true,
			formulas: {
				engine: hf
			},
			licenseKey: 'non-commercial-and-evaluation',

		cells(row, col) {
			const p = {};

			if (col === 0) p.readOnly = true;
			if (col === 2 && row >= 0 && row < 13) p.readOnly = true;
			if (col === 3 && row >= 0 && row < 13) p.readOnly = true;
			if (col === 4) p.readOnly = true;
			if (col === 5) p.readOnly = true;
			if (row === 0) p.readOnly = true;
			if (row === 4) p.readOnly = true;
			if (row === 5) p.readOnly = true;
			if (row === 6) p.readOnly = true;
			if (row === 8) p.readOnly = true;
			if (row === 9) p.readOnly = true;
			if (row === 11) p.readOnly = true;
			if (row === 12) p.readOnly = true;

			return p;
		}
	});
	</script>
</body>
</html>
